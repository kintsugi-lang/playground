name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by kintsugi master pushes via repository_dispatch so a new
  # transpiler build triggers a fresh playground deploy automatically.
  # Source workflow sends event_type `kintsugi-bump`.
  repository_dispatch:
    types: [kintsugi-bump]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout playground
        uses: actions/checkout@v4
        with:
          path: playground

      - name: Checkout kintsugi transpiler
        uses: actions/checkout@v4
        with:
          repository: kintsugi-lang/kintsugi
          path: kintsugi
          ref: master

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.x'

      - name: Build kintsugi_js bundle
        working-directory: kintsugi
        run: nim js -d:release --outdir:web src/kintsugi_js.nim

      - name: Sync bundle into playground
        working-directory: playground
        run: ./sync-bundle.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install playground deps
        working-directory: playground
        run: npm ci

      - name: Build playground
        working-directory: playground
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
